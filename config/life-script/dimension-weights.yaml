# 静态修正模块固定截在 -5 ~ +5。
static_adjustment:
  min: -5
  max: 5

# 身宫仍沿用现有“相关宫加权细调”的实现，不让身宫盖过主宫。
body_adjustment:
  relation_coeff:
    main: 1.0
    support: 0.7
    triad: 0.5
    weak_related: 0.3
    none: 0.0

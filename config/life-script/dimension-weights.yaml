# 五大维度权重配置。
# 每个维度都按“主宫 + 辅宫 + 三方四正 + 身宫修正”组合成维度原始分，
# 再在维度层叠加风险提示修正。

dimensions:
  total_luck:
    main:
      life: 0.5
    support:
      fortune: 0.18
      travel: 0.12
    triad_reference: life
    triad_weight: 0.15
    body_weight: 0.05
    module_caps:
      major_star: 14
      side_star: 6
    normalization:
      min_raw: -8
      max_raw: 16

  career:
    main:
      career: 0.5
    support:
      life: 0.1
      travel: 0.1
      social: 0.1
    triad_reference: career
    triad_weight: 0.15
    body_weight: 0.05
    module_caps:
      major_star: 14
      side_star: 6
    normalization:
      min_raw: -10
      max_raw: 16

  wealth:
